version: 1
name: "spark"
description: "Short-form video inspiration board with AI-powered campaign briefs"

services:
  web:
    app:
      build:
        dockerfile: "Dockerfile"
        context: "."
    expose: true
    env:
      ANTHROPIC_API_KEY: "${ENV.ANTHROPIC_API_KEY}"
      SLACK_CHANNEL_ID: "${ENV.SLACK_CHANNEL_ID}"
